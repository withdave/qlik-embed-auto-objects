name: Update Playwright Snapshots

on:
  workflow_dispatch:

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Update snapshots
        env:
          CI: "true"
          PORT: "3000"
          HOST: ${{ secrets.HOST }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          APP_ID: ${{ secrets.APP_ID }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: npm run test:e2e -- --update-snapshots

      - name: Open PR if snapshots changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/embed.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes — nothing to PR."
            exit 0
          fi
          BRANCH="snapshots/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update playwright snapshots"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update Playwright snapshots" \
            --body "Automated snapshot update from the \`update-snapshots\` workflow. Review the diff images before merging." \
            --base main \
            --head "$BRANCH"
